name: CI

# Runs the same gates locally and on every push/PR so type, lint, test, or
# build regressions never ship green. The app lives under frontend/.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Typecheck Pages Functions
        run: npx tsc -p functions/tsconfig.json --noEmit

      - name: Audit (non-blocking)
        run: npm audit --audit-level=high || true

      - name: Unit tests
        run: npm run test

      - name: Static export build
        run: npm run build
        env:
          NEXT_OUTPUT: export

  e2e:
    name: E2E smoke (Playwright, dual-theme)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_OUTPUT: export

      - name: E2E smoke
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
